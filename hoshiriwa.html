<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ホシリワ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
    }

    /* ===== ヘッダー ===== */
    header {
      width: 100%; text-align: center;
      padding: 20px 0;
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: white; font-size: 2em; font-weight: bold;
      position: fixed; top: 0; left: 0; z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      letter-spacing: 2px;
    }
    .menu-btn {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: white; font-size: 1.4em;
      cursor: pointer; width: auto;
      padding: 4px 8px; margin: 0; line-height: 1;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .header-balance {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.5em; font-weight: bold;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px; border-radius: 20px;
      display: none;
    }

    /* ===== ドロワー ===== */
    .drawer {
      position: fixed; top: 0; left: -260px;
      width: 240px; height: 100%;
      background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.2);
      z-index: 100; transition: left 0.3s ease; padding-top: 20px;
    }
    .drawer.open { left: 0; }
    .drawer-overlay {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 99;
    }
    .drawer-overlay.open { display: block; }
    .drawer-title {
      font-size: 1.2em; font-weight: bold; color: #4caf50;
      padding: 12px 20px 16px; border-bottom: 1px solid #eee;
    }
    .drawer-item {
      display: block; padding: 14px 20px; color: #333;
      text-decoration: none; font-size: 1em;
      border-bottom: 1px solid #f0f0f0; cursor: pointer;
    }
    .drawer-item:hover { background: #f5f5f5; }

    /* ===== ローディング ===== */
    #restoreLoading {
      position: fixed; inset: 0; background: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd; border-top-color: #4caf50;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { color: #888; font-size: 0.95em; }

    /* ===== コンテナ共通 ===== */
    .container {
      width: 360px; max-width: 92%;
      padding: 28px 24px;
      background: white; border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      text-align: center;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
    }

    input, textarea {
      width: 80%; padding: 11px;
      margin: 7px auto; font-size: 1em;
      border-radius: 8px; border: 1.5px solid #ddd;
      text-align: center; display: block;
      transition: border-color 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
    }
    input:focus, textarea:focus { outline: none; border-color: #4caf50; }
    textarea { text-align: left; }

    button {
      width: 80%; padding: 11px;
      margin: 7px auto; font-size: 1em;
      border-radius: 8px; border: none;
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: white; cursor: pointer; display: block;
      font-family: 'Noto Sans JP', sans-serif; font-weight: bold;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 3px 8px rgba(76,175,80,0.3);
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 5px 12px rgba(76,175,80,0.4); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ===== ログイン画面 ===== */
    #loginScreen { display: none; }
    .auth-tabs {
      display: flex; width: 90%; margin: 0 auto 20px;
      background: #f0f2f5; border-radius: 10px; padding: 4px;
      position: relative;
    }
    .auth-tab-indicator {
      position: absolute; top: 4px; left: 4px;
      width: calc(50% - 4px); height: calc(100% - 8px);
      background: white; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .auth-tab-indicator.register { transform: translateX(100%); }
    .auth-tab-btn {
      flex: 1; padding: 9px 0; background: none; border: none;
      font-size: 0.9em; font-weight: bold; color: #888; cursor: pointer;
      position: relative; z-index: 1; width: auto; margin: 0;
      box-shadow: none; border-radius: 8px; transition: color 0.3s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .auth-tab-btn.active { color: #4caf50; }
    .auth-tab-btn:hover { transform: none; box-shadow: none; background: none; }
    .auth-forms-wrapper { position: relative; }
    .auth-form-panel {
      width: 100%;
      transition: opacity 0.25s ease;
    }
    .auth-form-panel.hidden-panel {
      display: none;
    }

    /* ===== メイン画面 ===== */
    #mainScreen {
      position: static; transform: none;
      margin: 90px auto 40px auto;
      display: none;
    }

    /* 残高カード */
    .balance-card {
      background: linear-gradient(135deg, #43a047, #81c784);
      border-radius: 16px; padding: 20px;
      color: white; margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(76,175,80,0.35);
      position: relative; overflow: hidden; text-align: left;
    }
    .balance-card::before {
      content: '📦'; position: absolute;
      right: 16px; top: 16px; font-size: 2.2em; opacity: 0.3;
    }
    .balance-card .user-name { font-size: 0.9em; opacity: 0.85; margin-bottom: 4px; }
    .balance-card .balance-amount { font-size: 2em; font-weight: bold; }
    .balance-card .balance-unit { font-size: 0.9em; opacity: 0.8; }

    /* アクションカード */
    .action-card {
      background: white; border-radius: 14px;
      padding: 18px 20px; margin-bottom: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.07); text-align: left;
    }
    .action-card h3 {
      margin: 0 0 12px; font-size: 1em; color: #333;
      display: flex; align-items: center; gap: 6px;
    }
    .action-card input, .action-card textarea {
      width: calc(100% - 0px); margin: 5px 0;
      text-align: left;
    }
    .action-card button { width: 100%; margin: 8px 0 0; }

    /* 投稿リスト */
    .post-item {
      background: white; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
      text-align: left;
    }
    .post-item-header {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .post-title { font-weight: bold; font-size: 1em; color: #222; }
    .reward-badge {
      background: #fff8e1; color: #e65100;
      font-size: 0.8em; font-weight: bold;
      border-radius: 4px; padding: 2px 8px;
    }
    .status-badge {
      font-size: 0.78em; border-radius: 4px; padding: 2px 8px; font-weight: bold;
    }
    .status-open { background: #e8f5e9; color: #2e7d32; }
    .status-done { background: #f5f5f5; color: #999; }
    .post-desc { font-size: 0.88em; color: #555; margin: 4px 0 8px; line-height: 1.5; }
    .post-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .tag { display: inline-block; font-size: 0.78em; border-radius: 4px; padding: 2px 7px; }
    .tag.product { background: #e0f1e5; color: #2e6045; }
    .tag.request { background: #f1e0e0; color: #763232; }
    .post-meta { font-size: 0.78em; color: #aaa; margin-bottom: 8px; }
    .post-actions { display: flex; gap: 6px; }
    .btn-accept {
      flex: 1; padding: 8px; font-size: 0.88em;
      border-radius: 8px; border: none;
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: white; font-weight: bold; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      box-shadow: 0 2px 6px rgba(76,175,80,0.3);
      transition: transform 0.1s;
    }
    .btn-accept:hover { transform: translateY(-1px); }
    .btn-accept:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-gray-sm {
      flex: 1; padding: 8px; font-size: 0.88em;
      border-radius: 8px; border: 1.5px solid #ddd;
      background: white; color: #888; cursor: default;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* ボタンバリエーション */
    .btn-outline {
      background: white !important; color: #4caf50 !important;
      border: 2px solid #4caf50 !important; box-shadow: none !important;
    }
    .btn-outline:hover { background: #f1f8f1 !important; }
    .btn-gray {
      background: linear-gradient(135deg, #78909c, #90a4ae) !important;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15) !important;
    }

    /* メッセージ */
    .msg { font-size: 0.9em; margin: 6px 0; min-height: 20px; }

    #loading { display: none; color: #888; font-size: 0.9em; margin: 6px 0; }

    .notice {
      background: #fff8e1; border-left: 3px solid #ffa726;
      padding: 8px 12px; border-radius: 6px;
      font-size: 0.85em; color: #555; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div id="restoreLoading">
  <div class="spinner"></div>
  <span class="spinner-text">読み込み中...</span>
</div>

<header>
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  📦 ホシリワ
  <div class="header-balance" id="headerBalance">0 しむ</div>
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">📦 ホシリワ</div>
  <a class="drawer-item" href="index.html">🏦 しむPayに戻る</a>
  <a class="drawer-item" href="ranking.html">🏆 ランキング</a>
  <a class="drawer-item" href="https://forms.gle/3knWjZZchVdiuYZH6" target="_blank">🚨 通報フォーム</a>
  <a class="drawer-item" onclick="closeDrawer(); logout();">🚪 ログアウト</a>
</div>

<!-- ===== ログイン画面 ===== -->
<div class="container" id="loginScreen" style="display:none;">
  <div class="auth-tabs">
    <div class="auth-tab-indicator" id="tabIndicator"></div>
    <button class="auth-tab-btn active" id="tabLoginBtn" onclick="switchTab('login')">ログイン</button>
    <button class="auth-tab-btn" id="tabRegisterBtn" onclick="switchTab('register')">アカウント作成</button>
  </div>
  <div class="auth-forms-wrapper" id="authFormsWrapper">
    <div class="auth-form-panel">
      <input type="text" id="loginName" placeholder="名前">
      <input type="password" id="loginPass" placeholder="4桁パスワード">
      <br>
      <button onclick="login()">ログイン</button>
    </div>
    <div class="auth-form-panel hidden-panel">
      <input type="text" id="regName" placeholder="名前">
      <input type="password" id="regPass" placeholder="4桁パスワード">
      <input type="password" id="regPassConfirm" placeholder="パスワード確認">
      <br>
      <button onclick="createAccount()">アカウント作成</button>
    </div>
  </div>
  <p id="loading">処理中...</p>
  <p id="message" class="msg" style="color:red;"></p>
</div>

<!-- ===== メイン画面 ===== -->
<div class="container" id="mainScreen">

  <!-- 残高カード -->
  <div class="balance-card">
    <div class="user-name" id="userName">👤 ユーザー</div>
    <div style="font-size:0.8em;opacity:0.7;margin-bottom:2px;">残高</div>
    <div>
      <span class="balance-amount" id="balanceDisp">0</span>
      <span class="balance-unit"> しむ</span>
    </div>
  </div>

  <!-- 依頼投稿フォーム -->
  <div class="action-card">
    <h3>📝 依頼を投稿する</h3>
    <div class="notice">受注された時点で報酬が自動で相手に支払われます</div>
    <input type="text" id="postTitle" placeholder="依頼タイトル（必須）">
    <textarea id="postDesc" placeholder="依頼の詳細（必須）" rows="3"></textarea>
    <input type="text" id="postProductTag" placeholder="商品ジャンル（例：食品、ガジェット）">
    <input type="text" id="postRequestTag" placeholder="依頼ジャンル（例：写真、動画）">
    <div style="display:flex;align-items:center;gap:8px;margin:7px 0;">
      <input type="number" id="postReward" placeholder="報酬" min="1" max="100" style="width:auto;flex:1;text-align:center;">
      <span style="color:#4caf50;font-weight:bold;white-space:nowrap;">しむ（1〜100）</span>
    </div>
    <button onclick="submitPost()">依頼を投稿する</button>
    <p id="postMsg" class="msg" style="color:red;"></p>
  </div>

  <!-- 依頼一覧 -->
  <div class="action-card">
    <h3>📋 依頼一覧</h3>
    <input type="text" id="searchInput" placeholder="🔍 検索..." oninput="filterPosts()" style="margin-bottom:10px;">
    <div id="postList"><p style="color:#aaa;font-size:0.85em;">読み込み中...</p></div>
  </div>

  <button class="btn-gray" onclick="location.href='index.html'">🏦 しむPayに戻る</button>
  <button class="btn-outline" onclick="logout()">🚪 ログアウト</button>

</div>

<script type="module" src="hoshiriwa_shikumi.js"></script>

</body>
</html>
