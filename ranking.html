<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむ銀行 - ランキング</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f2f5;
    padding-top: 80px;
    padding-bottom: 40px;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background: #4caf50;
    color: white;
    font-size: 2em;
    font-weight: bold;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .container {
    width: 400px;
    max-width: 90%;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin: 20px auto;
  }
  h2 { text-align: center; margin-bottom: 16px; }
  .rank-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #eee;
    font-size: 1em;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-num {
    font-size: 1.2em;
    font-weight: bold;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-1 { color: #FFD700; font-size: 1.5em; }
  .rank-2 { color: #C0C0C0; font-size: 1.4em; }
  .rank-3 { color: #CD7F32; font-size: 1.3em; }
  .rank-name { flex: 1; margin-left: 10px; }
  .rank-balance { font-weight: bold; color: #4caf50; }
  .back-btn {
    display: block;
    width: 80%;
    padding: 10px;
    margin: 16px auto 0;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 1em;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  .back-btn:hover { background: #45a049; }
  #loading-msg { text-align: center; color: #888; padding: 20px; }
</style>
</head>
<body>
<header>しむ銀行</header>
<div class="container">
  <h2>🏆 しむランキング</h2>
  <div id="rankingList"><p id="loading-msg">読み込み中...</p></div>
  <a href="index.html" class="back-btn">← 銀行に戻る</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const snap = await get(ref(db, 'accounts'));
  const list = document.getElementById('rankingList');

  if (!snap.exists()) {
    list.innerHTML = '<p style="text-align:center;color:#888;">まだユーザーがいません</p>';
  } else {
    const accounts = snap.val();
    const sorted = Object.entries(accounts)
      .sort((a, b) => (b[1].balance || 0) - (a[1].balance || 0));

    const medals = ['🥇', '🥈', '🥉'];
    list.innerHTML = sorted.map(([name, data], i) => {
      const rankClass = i < 3 ? `rank-${i+1}` : '';
      const rankLabel = i < 3 ? medals[i] : `${i+1}位`;
      return `
        <div class="rank-item">
          <span class="rank-num ${rankClass}">${rankLabel}</span>
          <span class="rank-name">${name}</span>
          <span class="rank-balance">${data.balance || 0} しむ</span>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
