<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay - ランキング</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<link rel="stylesheet" href="style.css">
<style>
  body { padding-top: calc(var(--header-height) + env(safe-area-inset-top, 0px) + 16px); }

  .rank-container {
    width: 360px; max-width: 92%;
    padding: 24px 20px;
    background: white; border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    margin: 16px auto 32px;
    box-sizing: border-box;
  }

  h2 {
    text-align: center; margin: 0 0 24px;
    font-size: 1.3em; color: #333;
  }

  /* ===== 表彰台 ===== */
  .podium-wrapper {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    padding: 0 8px;
  }
  .podium-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .podium-crown { font-size: 1.4em; }
  .podium-rank {
    font-size: 0.82em; font-weight: bold;
    color: #666;
  }
  .podium-name {
    font-size: 0.88em; font-weight: bold;
    color: #333; text-align: center;
    max-width: 80px; word-break: break-all;
  }
  .podium-balance {
    font-size: 0.78em; color: #666;
    margin-bottom: 4px;
  }
  .podium-vip {
    display: inline-block; font-size: 0.65em; font-weight: bold;
    background: linear-gradient(135deg, #b8952a, #ffd700, #b8952a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    border: 1px solid #b8952a; border-radius: 3px;
    padding: 1px 4px; line-height: 1.4; margin-bottom: 2px;
  }
  .podium-bar {
    width: 100%; border-radius: 8px 8px 0 0;
  }
  .podium-1st .podium-bar { background: linear-gradient(180deg, #FFD700, #FFA500); height: 80px; }
  .podium-2nd .podium-bar { background: linear-gradient(180deg, #C0C0C0, #A0A0A0); height: 60px; }
  .podium-3rd .podium-bar { background: linear-gradient(180deg, #CD7F32, #A0522D); height: 44px; }

  /* 2位を左、1位を中央、3位を右に並べる */
  .podium-wrapper .podium-item:nth-child(1) { order: 1; }
  .podium-wrapper .podium-item:nth-child(2) { order: 0; }
  .podium-wrapper .podium-item:nth-child(3) { order: 2; }

  /* ===== 4位以下リスト ===== */
  .rank-list { border-top: 1px solid #f0f0f0; padding-top: 8px; }
  .rank-item {
    display: flex; align-items: center;
    padding: 12px 8px; border-bottom: 1px solid #f5f5f5;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-num {
    font-size: 0.9em; font-weight: bold; color: #4caf50;
    width: 36px; flex-shrink: 0; text-align: center;
  }
  .rank-name {
    flex: 1; font-size: 0.95em; color: #333;
    margin-left: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .rank-vip {
    display: inline-block; font-size: 0.65em; font-weight: bold;
    background: linear-gradient(135deg, #b8952a, #ffd700, #b8952a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    border: 1px solid #b8952a; border-radius: 3px;
    padding: 1px 4px; line-height: 1.4;
  }
  .rank-balance { font-size: 0.88em; font-weight: bold; color: #4caf50; }

  .back-link {
    display: block; text-align: center;
    margin-top: 20px; color: #4caf50;
    font-size: 0.95em; text-decoration: none; font-weight: bold;
  }
  .back-link:hover { text-decoration: underline; }

  #loading-msg { text-align: center; color: #888; padding: 20px; }
</style>
</head>
<body>
<header>しむPay</header>

<div class="rank-container">
  <h2>ランキング</h2>
  <div id="rankingContent"><p id="loading-msg">読み込み中...</p></div>
  <a href="index.html" class="back-link">ホームに戻る</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const snap = await get(ref(db, 'accounts'));
  const content = document.getElementById('rankingContent');

  if (!snap.exists()) {
    content.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">まだユーザーがいません</p>';
  } else {
    const accounts = snap.val();
    const sorted = Object.entries(accounts)
      .sort((a, b) => (b[1].balance || 0) - (a[1].balance || 0));

    const crowns = ['👑', '', ''];
    const rankLabels = ['1位', '2位', '3位'];
    const podiumClass = ['podium-1st', 'podium-2nd', 'podium-3rd'];

    // 表彰台（1〜3位）
    const top3 = sorted.slice(0, 3);
    // 2位・1位・3位の順で並べる（CSSのorderで制御）
    const podiumOrder = [
      top3[0], // 1位（order:1で中央）
      top3[1], // 2位（order:0で左）
      top3[2]  // 3位（order:2で右）
    ].filter(Boolean);

    let podiumHTML = '<div class="podium-wrapper">';
    podiumOrder.forEach((entry, idx) => {
      if (!entry) return;
      const [name, data] = entry;
      const realRank = sorted.indexOf(entry);
      const vipBadge = data.isPremium ? '<span class="podium-vip">VIP</span>' : '';
      podiumHTML += `
        <div class="podium-item ${podiumClass[realRank]}">
          <div class="podium-crown">${crowns[realRank]}</div>
          <div class="podium-rank">${rankLabels[realRank]}</div>
          ${vipBadge}
          <div class="podium-name">${name}</div>
          <div class="podium-balance">${data.balance || 0} しむ</div>
          <div class="podium-bar"></div>
        </div>`;
    });
    podiumHTML += '</div>';

    // 4位以下
    let listHTML = '<div class="rank-list">';
    sorted.slice(3).forEach(([name, data], i) => {
      const vipBadge = data.isPremium ? '<span class="rank-vip">VIP</span>' : '';
      listHTML += `
        <div class="rank-item">
          <span class="rank-num">${i + 4}位</span>
          <span class="rank-name">${name}${vipBadge}</span>
          <span class="rank-balance">${data.balance || 0} しむ</span>
        </div>`;
    });
    listHTML += '</div>';

    content.innerHTML = podiumHTML + listHTML;
  }
</script>
</body>
</html>
