<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="しむPay">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f2f5;
  }

  /* ===== ヘッダー ===== */
  header {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background: linear-gradient(135deg, #43a047, #66bb6a);
    color: white;
    font-size: 2em;
    font-weight: bold;
    position: fixed;
    top: 0; left: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    letter-spacing: 2px;
  }
  .menu-btn {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: white; font-size: 1.4em;
    cursor: pointer; width: auto;
    padding: 4px 8px; margin: 0; line-height: 1;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }

  /* ===== ドロワー ===== */
  .drawer {
    position: fixed; top: 0; left: -260px;
    width: 240px; height: 100%;
    background: white;
    box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    z-index: 100; transition: left 0.3s ease; padding-top: 20px;
  }
  .drawer.open { left: 0; }
  .drawer-overlay {
    display: none; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4); z-index: 99;
  }
  .drawer-overlay.open { display: block; }
  .drawer-title {
    font-size: 1.2em; font-weight: bold; color: #4caf50;
    padding: 12px 20px 16px; border-bottom: 1px solid #eee;
  }
  .drawer-item {
    display: block; padding: 14px 20px; color: #333;
    text-decoration: none; font-size: 1em;
    border-bottom: 1px solid #f0f0f0; cursor: pointer;
  }
  .drawer-item:hover { background: #f5f5f5; }

  /* ===== コンテナ共通 ===== */
  .container {
    width: 360px; max-width: 92%;
    padding: 28px 24px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    text-align: center;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  input {
    width: 80%; padding: 11px;
    margin: 7px auto; font-size: 1em;
    border-radius: 8px; border: 1.5px solid #ddd;
    text-align: center; display: block;
    transition: border-color 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  input:focus { outline: none; border-color: #4caf50; }

  button {
    width: 80%; padding: 11px;
    margin: 7px auto; font-size: 1em;
    border-radius: 8px; border: none;
    background: linear-gradient(135deg, #43a047, #66bb6a);
    color: white; cursor: pointer; display: block;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: bold;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 3px 8px rgba(76,175,80,0.3);
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 5px 12px rgba(76,175,80,0.4); }
  button:active { transform: translateY(0); }

  /* ===== ログイン画面 タブ ===== */
  #loginScreen { overflow: hidden; }

  .auth-tabs {
    display: flex;
    width: 90%; margin: 0 auto 20px;
    background: #f0f2f5;
    border-radius: 10px; padding: 4px;
    position: relative;
  }
  .auth-tab-indicator {
    position: absolute;
    top: 4px; left: 4px;
    width: calc(50% - 4px);
    height: calc(100% - 8px);
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .auth-tab-indicator.register { transform: translateX(100%); }
  .auth-tab-btn {
    flex: 1; padding: 9px 0;
    background: none; border: none;
    font-size: 0.9em; font-weight: bold;
    color: #888; cursor: pointer;
    position: relative; z-index: 1;
    width: auto; margin: 0; box-shadow: none;
    border-radius: 8px;
    transition: color 0.3s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .auth-tab-btn.active { color: #4caf50; }
  .auth-tab-btn:hover { transform: none; box-shadow: none; background: none; }

  /* スライドするフォームラッパー */
  .auth-forms-wrapper {
    display: flex;
    width: 200%;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .auth-forms-wrapper.show-register { transform: translateX(-50%); }
  .auth-form-panel {
    width: 50%;
    flex-shrink: 0;
  }

  #loading {
    display: none; color: #888; font-size: 0.9em; margin: 6px 0;
  }

  /* ===== ホーム画面（銀行） ===== */
  #bankScreen {
    position: static; transform: none;
    margin: 90px auto 40px auto;
    display: none;
  }

  /* 残高カード */
  .balance-card {
    background: linear-gradient(135deg, #43a047, #81c784);
    border-radius: 16px;
    padding: 24px 20px;
    color: white;
    margin-bottom: 20px;
    box-shadow: 0 6px 20px rgba(76,175,80,0.35);
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '🏦';
    position: absolute;
    right: 16px; top: 16px;
    font-size: 2.2em;
    opacity: 0.3;
  }
  .balance-card .user-name {
    font-size: 0.95em; opacity: 0.85; margin-bottom: 6px;
  }
  .balance-card .balance-label {
    font-size: 0.85em; opacity: 0.7; margin-bottom: 2px;
  }
  .balance-card .balance-amount {
    font-size: 2.4em; font-weight: bold; letter-spacing: 1px;
  }
  .balance-card .balance-unit {
    font-size: 1em; opacity: 0.8;
  }

  /* アクションカード */
  .action-card {
    background: white;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.07);
    text-align: left;
  }
  .action-card h3 {
    margin: 0 0 12px 0;
    font-size: 1em;
    color: #333;
    display: flex; align-items: center; gap: 6px;
  }
  .action-card input {
    width: calc(100% - 24px);
    margin: 5px 0; text-align: left;
  }
  .action-card button {
    width: 100%; margin: 8px 0 0;
  }

  /* 取引履歴 */
  #history {
    max-height: 150px; overflow-y: scroll;
    margin-top: 6px; text-align: left;
  }
  .history-item {
    margin: 6px 0; font-size: 0.88em;
    color: #555; padding: 4px 0;
    border-bottom: 1px solid #f5f5f5;
  }

  /* 申請リスト */
  #pendingList {
    max-height: 150px; overflow-y: scroll;
    text-align: left; font-size: 0.9em;
  }

  /* ボタンバリエーション */
  .btn-outline {
    background: white !important;
    color: #4caf50 !important;
    border: 2px solid #4caf50 !important;
    box-shadow: none !important;
  }
  .btn-outline:hover { background: #f1f8f1 !important; }
  .btn-gray { background: linear-gradient(135deg, #78909c, #90a4ae) !important; box-shadow: 0 3px 8px rgba(0,0,0,0.15) !important; }
  .btn-danger { background: linear-gradient(135deg, #e53935, #ef5350) !important; box-shadow: 0 3px 8px rgba(229,57,53,0.3) !important; }

  /* ボーナスボタン */
  .bonus-btn {
    background: linear-gradient(135deg, #f57c00, #ffa726) !important;
    box-shadow: 0 3px 8px rgba(245,124,0,0.35) !important;
    margin-bottom: 4px !important;
  }

  /* 管理者画面 */

  /* ===== お知らせ ===== */
  .notice-card {
    background: white;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.07);
    text-align: left;
    border-left: 4px solid #4caf50;
  }
  .notice-card h3 {
    margin: 0 0 12px 0;
    font-size: 1em;
    color: #333;
    display: flex; align-items: center; gap: 6px;
  }
  .notice-item {
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .notice-item:last-child { border-bottom: none; }
  .notice-date { font-size: 0.78em; color: #333; margin-bottom: 3px; }
  .notice-title { font-weight: bold; font-size: 0.95em; color: #333; margin-bottom: 3px; }
  .notice-body { font-size: 0.88em; color: #333; line-height: 1.5; }
  .notice-empty { color: #aaa; font-size: 0.85em; margin: 0; }

  /* リロード復元中オーバーレイ */
  #restoreLoading {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #f0f2f5;
    display: flex; align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 14px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #ddd;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { color: #888; font-size: 0.95em; }
</style>
</head>
<body>

<!-- リロード復元中オーバーレイ -->
<div id="restoreLoading">
  <div class="spinner"></div>
  <span class="spinner-text">読み込み中...</span>
</div>

<header>
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  🏦 しむPay
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">🏦 しむPay</div>
  <a class="drawer-item" href="ranking.html">🏆 ランキング</a>
  <a class="drawer-item" onclick="closeDrawer(); logout();">🚪 ログアウト</a>
</div>

<!-- ===== ログイン画面 ===== -->
<div class="container" id="loginScreen">

  <!-- タブ -->
  <div class="auth-tabs">
    <div class="auth-tab-indicator" id="tabIndicator"></div>
    <button class="auth-tab-btn active" id="tabLoginBtn" onclick="switchAuthTab('login')">ログイン</button>
    <button class="auth-tab-btn" id="tabRegisterBtn" onclick="switchAuthTab('register')">アカウント作成</button>
  </div>

  <!-- スライドするフォーム -->
  <div class="auth-forms-wrapper" id="authFormsWrapper">

    <!-- ログインフォーム -->
    <div class="auth-form-panel">
      <input type="text" id="loginName" placeholder="名前">
      <input type="password" id="loginPass" placeholder="4桁パスワード">
      <br>
      <button onclick="login()">ログイン</button>
    </div>

    <!-- アカウント作成フォーム -->
    <div class="auth-form-panel">
      <input type="text" id="regName" placeholder="名前">
      <input type="password" id="regPass" placeholder="4桁パスワード">
      <input type="password" id="regPassConfirm" placeholder="パスワード確認">
      <br>
      <button onclick="createAccount()">アカウント作成</button>
    </div>

  </div>

  <p id="loading">処理中...</p>
  <p id="message" style="color:red; margin:4px 0; font-size:0.9em;"></p>
</div>

<!-- ===== ホーム（銀行）画面 ===== -->
<div class="container" id="bankScreen">

  <!-- お知らせ -->
  <div class="notice-card">
    <h3>📢 お知らせ</h3>
    <div id="noticeList"><p class="notice-empty">読み込み中...</p></div>
  </div>

  <!-- 残高カード -->
  <div class="balance-card">
    <div class="user-name" id="userName">👤 ユーザー</div>
    <div class="balance-label">残高</div>
    <div>
      <span class="balance-amount" id="balance">0</span>
      <span class="balance-unit"> しむ</span>
    </div>
  </div>

  <!-- ボーナス -->
  <button class="bonus-btn" onclick="getLocationBonus()">📍 ログインボーナス +2 しむ</button>

  <!-- 送金申請 -->
  <div class="action-card">
    <h3>📨 送金申請</h3>
    <input type="text" id="sendTo" placeholder="送金先の名前">
    <input type="number" id="sendAmount" placeholder="送金額（最大10しむ）">
    <button onclick="sendMoney()">申請する</button>
  </div>

  <!-- 受信申請 -->
  <div class="action-card">
    <h3>📬 受信した申請</h3>
    <div id="pendingList"><p style="color:#aaa;font-size:0.85em;margin:0;">申請はありません</p></div>
  </div>

  <!-- 取引履歴 -->
  <div class="action-card">
    <h3>📋 取引履歴</h3>
    <div id="history"></div>
  </div>

  <button class="btn-gray" onclick="location.href='ranking.html'">🏆 ランキングを見る</button>
  <button class="btn-outline" onclick="logout()">🚪 ログアウト</button>
  <p id="bankMessage" style="color:red; font-size:0.9em; margin:6px 0;"></p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b",
    measurementId: "G-Q5W7V24NC7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null;
  let currentUserName = null;

  // ===== お知らせ（Googleスプレッドシート連携） =====
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbys3jtI5KoMIxZb56RX2a8sxHRIwmRi0JNZRb8ixtIa9oMEhZdGf0--KzfmYN8i7ZgC/exec';

  async function loadNotices() {
    const div = document.getElementById('noticeList');
    try {
      const res = await fetch(GAS_URL);
      const notices = await res.json();
      if (!notices || notices.length === 0) {
        div.innerHTML = '<p class="notice-empty">お知らせはありません</p>';
        return;
      }
      div.innerHTML = notices.map(n => {
        // 日付を「M/D」形式に変換
        let dateStr = n.date;
        try {
          const d = new Date(n.date);
          if (!isNaN(d)) dateStr = `${d.getMonth()+1}/${d.getDate()}`;
        } catch(e) {}
        return `
        <div class="notice-item">
          <div class="notice-date">${dateStr}　${n.title}</div>
          ${n.body ? `<div class="notice-body">${n.body}</div>` : ''}
        </div>`;
      }).join('');
    } catch(e) {
      div.innerHTML = '<p class="notice-empty">お知らせを取得できませんでした</p>';
    }
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
  }

  // ===== タブ切り替え（スライドアニメーション） =====
  window.switchAuthTab = function(tab) {
    const wrapper = document.getElementById('authFormsWrapper');
    const indicator = document.getElementById('tabIndicator');
    const loginBtn = document.getElementById('tabLoginBtn');
    const registerBtn = document.getElementById('tabRegisterBtn');
    const msg = document.getElementById('message');

    msg.textContent = '';

    if (tab === 'register') {
      wrapper.classList.add('show-register');
      indicator.classList.add('register');
      loginBtn.classList.remove('active');
      registerBtn.classList.add('active');
    } else {
      wrapper.classList.remove('show-register');
      indicator.classList.remove('register');
      loginBtn.classList.add('active');
      registerBtn.classList.remove('active');
    }
  };

  // ===== アカウント作成 =====
  window.createAccount = async function() {
    const name = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPass').value.trim();
    const passConfirm = document.getElementById('regPassConfirm').value.trim();
    const msg = document.getElementById('message');

    const ngWords = ['まんこ','ちんこ','おまんこ','おちんこ','おちんぽ','シコシコ','しこしこ','おっぱい','おつぱい','セックス','せっくす','セツクス','おしっこ','おしつこ','アナル','あなる','死ね','しね','殺す','ころす','クズ','くず','バカ','ばか','アホ','あほ','キモい','きもい','うんこ','ウンコ','うんち','ウンチ','ちんぽ','チンポ','ちんぽこ','チンポコ'];
    if (ngWords.some(w => name.includes(w))) { msg.style.color='red'; msg.textContent='その名前は使用できません'; return; }
    if (!name) { msg.style.color='red'; msg.textContent='名前を入力してください'; return; }
    if (!pass || pass.length !== 4 || !/^\d{4}$/.test(pass)) { msg.style.color='red'; msg.textContent='パスワードは数字4桁にしてください'; return; }
    const ngPass = ['4545', '0721'];
    if (ngPass.includes(pass)) { msg.style.color='red'; msg.textContent='そのパスワードは使用できません'; return; }
    if (pass !== passConfirm) { msg.style.color='red'; msg.textContent='パスワードが一致しません'; return; }

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (snapshot.exists()) { msg.style.color='red'; msg.textContent='その名前はすでに使われています'; showLoading(false); return; }

    const allSnap = await get(ref(db, 'accounts'));
    const count = allSnap.exists() ? Object.keys(allSnap.val()).length : 0;
    if (count >= 50) { msg.style.color='red'; msg.textContent='アカウント上限に達しました'; showLoading(false); return; }

    await set(ref(db, 'accounts/' + name), { pass, balance: 0, history: [], lastBonus: 0, createdAt: Date.now() });

    msg.style.color = 'green';
    msg.textContent = 'アカウント作成成功！ログインしてください';
    document.getElementById('regName').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPassConfirm').value = '';
    showLoading(false);
    setTimeout(() => switchAuthTab('login'), 1200);
  };

  // ===== ログイン =====
  window.login = async function() {
    const name = document.getElementById('loginName').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const msg = document.getElementById('message');

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (!snapshot.exists() || snapshot.val().pass !== pass) {
      msg.style.color='red'; msg.textContent='名前またはパスワードが違います'; showLoading(false); return;
    }

    currentUser = snapshot.val();
    currentUserName = name;
    saveSession(name);

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('bankScreen').style.display = 'block';
    updateBankUI();
    loadPendingRequests();
    loadNotices();

    document.getElementById('loginName').value = '';
    document.getElementById('loginPass').value = '';
    msg.textContent = '';
    showLoading(false);
  };

  // ===== 残高・履歴表示 =====
  function updateBankUI() {
    document.getElementById('userName').textContent = '👤 ' + currentUserName;
    document.getElementById('balance').textContent = currentUser.balance;
    const historyDiv = document.getElementById('history');
    historyDiv.innerHTML = '';
    const hist = currentUser.history || [];
    if (hist.length === 0) {
      historyDiv.innerHTML = '<p style="color:#aaa;font-size:0.85em;margin:0;">取引履歴はありません</p>';
      return;
    }
    hist.slice().reverse().forEach(h => {
      const div = document.createElement('div');
      div.textContent = h;
      div.className = 'history-item';
      historyDiv.appendChild(div);
    });
  }

  // ===== 送金申請 =====
  window.sendMoney = async function() {
    const toName = document.getElementById('sendTo').value.trim();
    const amount = Number(document.getElementById('sendAmount').value);
    const msg = document.getElementById('bankMessage');

    if (!toName || amount <= 0 || currentUser.balance < amount) { msg.style.color='red'; msg.textContent='送金できません（残高不足または入力エラー）'; return; }
    if (toName === currentUserName) { msg.style.color='red'; msg.textContent='自分自身には送金できません'; return; }
    if (amount > 10) { msg.style.color='red'; msg.textContent='1回の送金は10しむまでです'; return; }

    showLoading(true);
    try {
      const receiverSnap = await get(ref(db, 'accounts/' + toName));
      if (!receiverSnap.exists()) { msg.style.color='red'; msg.textContent='送金先が見つかりません'; showLoading(false); return; }

      const requestId = Date.now().toString();
      await set(ref(db, `requests/${toName}/${requestId}`), { from: currentUserName, amount, timestamp: requestId });

      msg.style.color='green'; msg.textContent=`${toName}に申請を送りました！承認を待ってください`;
      document.getElementById('sendTo').value = '';
      document.getElementById('sendAmount').value = '';
    } catch(e) { msg.style.color='red'; msg.textContent='申請に失敗しました'; }
    finally { showLoading(false); }
  };

  // ===== 受信申請を表示 =====
  async function loadPendingRequests() {
    const snap = await get(ref(db, `requests/${currentUserName}`));
    const div = document.getElementById('pendingList');
    if (!snap.exists()) { div.innerHTML = '<p style="color:#aaa;font-size:0.85em;margin:0;">申請はありません</p>'; return; }
    const requests = snap.val();
    div.innerHTML = Object.entries(requests).map(([id, req]) => `
      <div style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
        <b>${req.from}</b> から <b>${req.amount} しむ</b> の申請
        <div style="margin-top:6px;display:flex;gap:6px;">
          <button onclick="approveRequest('${id}','${req.from}',${req.amount})" style="width:auto;padding:5px 12px;font-size:0.85em;display:inline-block;margin:0;flex:1;">✅ 承認</button>
          <button onclick="rejectRequest('${id}')" style="width:auto;padding:5px 12px;font-size:0.85em;display:inline-block;margin:0;flex:1;background:linear-gradient(135deg,#e53935,#ef5350);box-shadow:0 3px 8px rgba(229,57,53,0.3);">❌ 拒否</button>
        </div>
      </div>`).join('');
  }

  // ===== 承認 =====
  window.approveRequest = async function(requestId, fromName, amount) {
    const msg = document.getElementById('bankMessage');
    try {
      const senderSnap = await get(ref(db, 'accounts/' + fromName));
      if (!senderSnap.exists()) { msg.style.color='red'; msg.textContent='送金者が見つかりません'; return; }
      const sender = senderSnap.val();
      if (sender.balance < amount) { msg.style.color='red'; msg.textContent='送金者の残高が不足しています'; return; }

      const updates = {};
      updates[`accounts/${fromName}/balance`] = sender.balance - amount;
      updates[`accounts/${fromName}/history`] = [...(sender.history||[]), `${currentUserName} に ${amount} しむ送金（承認済み）`].slice(-10);
      updates[`accounts/${currentUserName}/balance`] = currentUser.balance + amount;
      updates[`accounts/${currentUserName}/history`] = [...(currentUser.history||[]), `${fromName} から ${amount} しむ受取（承認）`].slice(-10);
      updates[`requests/${currentUserName}/${requestId}`] = null;

      await update(ref(db), updates);
      currentUser.balance += amount;
      currentUser.history = [...(currentUser.history||[]), `${fromName} から ${amount} しむ受取（承認）`].slice(-10);
      updateBankUI();
      loadPendingRequests();
      msg.style.color='green'; msg.textContent=`${fromName}からの${amount}しむを承認しました！`;
    } catch(e) { msg.style.color='red'; msg.textContent='承認に失敗しました'; }
  };

  // ===== 拒否 =====
  window.rejectRequest = async function(requestId) {
    const msg = document.getElementById('bankMessage');
    await set(ref(db, `requests/${currentUserName}/${requestId}`), null);
    loadPendingRequests();
    msg.style.color='#888'; msg.textContent='申請を拒否しました';
  };

  // ===== 位置情報ボーナス =====
  window.getLocationBonus = async function() {
    const msg = document.getElementById('bankMessage');
    const btn = document.querySelector('.bonus-btn');
    const now = Date.now();

    if (now - (currentUser.lastLocationBonus || 0) < 24 * 60 * 60 * 1000) {
      msg.style.color='red'; msg.textContent='位置情報ボーナスは24時間に1回です'; return;
    }
    if (!navigator.geolocation) { msg.textContent='このブラウザは位置情報に対応していません'; return; }

    btn.disabled = true;
    msg.style.color='#888'; msg.textContent='位置情報を取得中...';

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      const targetLat = 35.5627, targetLon = 139.7163, limit = 500;
      const R = 6371000;
      const dLat = (lat - targetLat) * Math.PI / 180;
      const dLon = (lon - targetLon) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(targetLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLon/2)**2;
      const distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

      if (distance <= limit) {
        currentUser.balance += 2;
        currentUser.history = currentUser.history || [];
        currentUser.history.push('📍 ログインボーナス +2 しむ');
        currentUser.lastLocationBonus = now;
        await set(ref(db, 'accounts/' + currentUserName), currentUser);
        updateBankUI();
        msg.style.color='green'; msg.textContent='📍 ボーナス +2 しむ獲得！';
      } else {
        msg.style.color='red'; msg.textContent=`対象の場所から離れています（約${Math.round(distance)}m）`;
      }
      btn.disabled = false;
    }, () => {
      msg.style.color='red'; msg.textContent='位置情報の取得に失敗しました';
      btn.disabled = false;
    }, { timeout: 10000 });
  };

  // ===== ログアウト =====
  window.logout = function() {
    currentUser = null; currentUserName = null;
    clearSession();
    document.getElementById('bankScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  };

  // ===== セッション保存・復元 =====
  function saveSession(name) { localStorage.setItem('shimupay_user', name); }
  function clearSession() { localStorage.removeItem('shimupay_user'); }

  function showScreen(screen) {
    document.getElementById('restoreLoading').style.display = 'none';
    document.getElementById('loginScreen').style.display = screen === 'login' ? 'block' : 'none';
    document.getElementById('bankScreen').style.display = screen === 'bank' ? 'block' : 'none';
  }

  async function restoreSession() {
    const saved = localStorage.getItem('shimupay_user');
    if (!saved) { showScreen('login'); return; }

    try {
      const snap = await get(ref(db, 'accounts/' + saved));
      if (snap.exists()) {
        currentUser = snap.val();
        currentUserName = saved;
        showScreen('bank');
        updateBankUI();
        loadPendingRequests();
        loadNotices();
      } else {
        clearSession();
        showScreen('login');
      }
    } catch(e) {
      clearSession();
      showScreen('login');
    }
  }

  // 起動時にセッション復元
  restoreSession();
</script>

<script>
  function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
