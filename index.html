<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  html, body { height: 100%; margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background: #f0f2f5; }
  header { width: 100%; text-align: center; padding: 20px 0; background: #4caf50; color: white; font-size: 2em; font-weight: bold; position: fixed; top: 0; left: 0; z-index: 10; }
  .menu-btn { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 1.4em; cursor: pointer; }
  .drawer { position: fixed; top: 0; left: -260px; width: 240px; height: 100%; background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.2); z-index: 100; transition: left 0.3s ease; padding-top: 20px; }
  .drawer.open { left: 0; }
  .drawer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }
  .drawer-overlay.open { display: block; }
  .container { width: 350px; max-width: 90%; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  input, button { width: 80%; padding: 10px; margin: 8px auto; font-size: 1em; border-radius: 5px; border: 1px solid #ccc; text-align: center; display: block; }
  button { background: #4caf50; color: white; border: none; cursor: pointer; }
  .tab-btns { display: flex; width: 80%; margin: 0 auto 16px auto; border: 1px solid #4caf50; border-radius: 5px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 8px 0; background: white; color: #4caf50; border: none; cursor: pointer; }
  .tab-btn.active { background: #4caf50; color: white; }
  #bankScreen, #adminScreen { position: static; transform: none; margin: 90px auto 40px auto; display: none; }
  #restoreLoading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; color: #888; }
  .spinner { width: 36px; height: 36px; border: 4px solid #ccc; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="restoreLoading"><div class="spinner"></div><span>接続中...</span></div>

<header>
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  しむPay
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-item" onclick="logout()">🚪 ログアウト</div>
</div>

<div class="container" id="loginScreen" style="display:none;">
  <h2 id="loginTitle">ログイン</h2>
  <div class="tab-btns">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">新規作成</button>
  </div>
  <input type="text" id="nameInput" placeholder="名前">
  <input type="password" id="passInput" placeholder="4桁パスワード">
  <div id="loginForm"><button onclick="login()">ログイン</button></div>
  <div id="registerForm" style="display:none;">
    <input type="password" id="passConfirmInput" placeholder="パスワード確認">
    <button onclick="createAccount()">作成</button>
  </div>
  <p id="message" style="color:red;"></p>
</div>

<div class="container" id="bankScreen">
  <h2>残高: <span id="balance">0</span> しむ</h2>
  <button onclick="getLocationBonus()">📍 ログインボーナス +2</button>
  <h3>送金申請</h3>
  <input type="text" id="sendTo" placeholder="相手の名前">
  <input type="number" id="sendAmount" placeholder="金額">
  <button onclick="sendMoney()">申請</button>
  <div id="pendingList"></div>
  <button onclick="logout()">ログアウト</button>
</div>

<div class="container" id="adminScreen">
  <h2>🔧 管理者パネル</h2>
  <input type="text" id="adminDepositName" placeholder="ユーザー名">
  <input type="number" id="adminDepositAmount" placeholder="金額">
  <button onclick="adminDeposit()">入金実行</button>
  <div id="adminUserList" style="text-align:left; margin-top:10px;"></div>
  <button onclick="logout()">ログアウト</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentUser = null;
  let currentUserName = null;

  // ログイン処理 (セキュリティルール対応版)
  window.login = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    if(name === "管理者" && pass === "administrator2026") {
      currentUserName = name; showScreen('admin'); adminRefreshList(); return;
    }
    try {
      // 特定のパスワードを持つアカウントを検索 (indexOn: ["pass"] が必須)
      const q = query(ref(db, 'accounts/' + name));
      const snap = await get(q);
      if (snap.exists() && snap.val().pass === pass) {
        currentUser = snap.val();
        currentUserName = name;
        showScreen('bank');
        updateBankUI();
      } else { alert("名前またはパスワードが違います"); }
    } catch (e) { alert("ログインエラー: ルールを確認してください"); }
  };

  window.createAccount = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    if(!name || pass.length !== 4) return alert("入力不備");
    await set(ref(db, 'accounts/' + name), { pass, balance: 0, createdAt: Date.now() });
    alert("作成完了！ログインしてください");
    switchTab('login');
  };

  function showScreen(s) {
    document.getElementById('restoreLoading').style.display = 'none';
    document.getElementById('loginScreen').style.display = s==='login'?'block':'none';
    document.getElementById('bankScreen').style.display = s==='bank'?'block':'none';
    document.getElementById('adminScreen').style.display = s==='admin'?'block':'none';
  }

  window.updateBankUI = () => { document.getElementById('balance').textContent = currentUser.balance; };
  window.logout = () => location.reload();
  window.switchTab = (t) => {
    document.getElementById('loginForm').style.display = t==='login'?'block':'none';
    document.getElementById('registerForm').style.display = t==='register'?'block':'none';
    document.getElementById('tabLogin').className = t==='login'?'tab-btn active':'tab-btn';
    document.getElementById('tabRegister').className = t==='register'?'tab-btn active':'tab-btn';
  };

  // 管理者用：一覧表示
  window.adminRefreshList = async () => {
    const snap = await get(ref(db, 'accounts'));
    if(snap.exists()) {
      document.getElementById('adminUserList').innerHTML = Object.entries(snap.val()).map(([n, d]) => `<div>${n}: ${d.balance}しむ</div>`).join('');
    }
  };

  showScreen('login');
</script>

<script>
  function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('drawerOverlay').classList.toggle('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
</script>
</body>
</html>
