<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="しむPay">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f2f5;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background: #4caf50;
    color: white;
    font-size: 2em;
    font-weight: bold;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .menu-btn {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: white;
    font-size: 1.4em;
    cursor: pointer;
    width: auto;
    padding: 4px 8px;
    margin: 0;
    line-height: 1;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
  .drawer {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: white;
    box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    z-index: 100;
    transition: left 0.3s ease;
    padding-top: 20px;
  }
  .drawer.open { left: 0; }
  .drawer-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }
  .drawer-overlay.open { display: block; }
  .drawer-title {
    font-size: 1.2em;
    font-weight: bold;
    color: #4caf50;
    padding: 12px 20px 16px;
    border-bottom: 1px solid #eee;
  }
  .drawer-item {
    display: block;
    padding: 14px 20px;
    color: #333;
    text-decoration: none;
    font-size: 1em;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
  }
  .drawer-item:hover { background: #f5f5f5; }
  .container {
    width: 350px;
    max-width: 90%;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  input, button {
    width: 80%;
    padding: 10px;
    margin: 8px auto;
    font-size: 1em;
    border-radius: 5px;
    border: 1px solid #ccc;
    text-align: center;
    display: block;
  }
  button {
    background: #4caf50;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background: #45a049;
  }
  #bankScreen, #adminScreen {
    position: static;
    transform: none;
    margin: 90px auto 40px auto;
    display: none;
  }
  #history {
    max-height: 150px;
    overflow-y: scroll;
    margin-top: 10px;
    border-top: 1px solid #ccc;
    padding-top: 10px;
    text-align: left;
  }
  .history-item {
    margin: 5px 0;
  }
  #loading {
    display: none;
    color: #888;
    font-size: 0.9em;
    margin: 6px 0;
  }
</style>
</head>
<body>

<header>
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  しむPay
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">🏦 しむPay</div>
  <a class="drawer-item" href="ranking.html">🏆 ランキング</a>
  <a class="drawer-item" onclick="closeDrawer(); logout();">🚪 ログアウト</a>
</div>

<div class="container" id="loginScreen">
  <h2>ログイン / アカウント作成</h2>
  <input type="text" id="nameInput" placeholder="名前">
  <input type="password" id="passInput" placeholder="4桁パスワード">
  <br>
  <button onclick="createAccount()">アカウント作成</button>
  <button onclick="login()">ログイン</button>
  <p id="loading">処理中...</p>
  <p id="message" style="color:red;"></p>
</div>

<div class="container" id="bankScreen">
  <h2>しむPayアカウント</h2>
  <p>残高: <span id="balance">0</span> しむ</p>
  <button onclick="getLocationBonus()">📍 ログインボーナス +2 しむ</button>

  <h3>📨 送金申請</h3>
  <input type="text" id="sendTo" placeholder="送金先">
  <input type="number" id="sendAmount" placeholder="送金額">
  <br>
  <button onclick="sendMoney()">申請する</button>

  <h3>📬 受信した申請</h3>
  <div id="pendingList" style="max-height:150px;overflow-y:scroll;text-align:left;border-top:1px solid #ccc;padding-top:8px;font-size:0.9em;"></div>

  <h3>取引履歴</h3>
  <div id="history"></div>
  <br>
  <button onclick="logout()">ログアウト</button>
  <button onclick="location.href='ranking.html'" style="background:#888;">🏆 ランキングを見る</button>
  <p id="bankMessage" style="color:red;"></p>
</div>

<div class="container" id="adminScreen" style="display:none;overflow-y:auto;">
  <h2>🔧 管理者画面</h2>
  <h3>残高を設定</h3>
  <input type="text" id="adminTargetName" placeholder="対象ユーザー名">
  <input type="number" id="adminSetAmount" placeholder="設定する残高">
  <button onclick="adminSetBalance()">残高を設定</button>
  <h3>入金（管理者から付与）</h3>
  <input type="text" id="adminDepositName" placeholder="入金先ユーザー名">
  <input type="number" id="adminDepositAmount" placeholder="入金額">
  <button onclick="adminDeposit()">入金</button>
  <h3>引き出し（管理者に回収）</h3>
  <input type="text" id="adminWithdrawName" placeholder="引き出しユーザー名">
  <input type="number" id="adminWithdrawAmount" placeholder="引き出し額">
  <button onclick="adminWithdraw()">引き出し</button>
  <h3>全員一覧</h3>
  <div id="adminUserList" style="max-height:200px;overflow-y:scroll;text-align:left;border-top:1px solid #ccc;padding-top:10px;font-size:0.9em;"></div>
  <br>
  <button onclick="adminRefreshList()" style="background:#888;">一覧を更新</button>
  <button onclick="logout()">ログアウト</button>
  <p id="adminMessage" style="color:red;"></p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // =============================
  // 🔧 ここにFirebaseの設定を貼り付ける
  // =============================
  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b",
    measurementId: "G-Q5W7V24NC7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null;
  let currentUserName = null;

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
  }

  // アカウント作成
  window.createAccount = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const msg = document.getElementById('message');

    if (!name || pass.length !== 4) {
      msg.style.color = 'red';
      msg.textContent = "名前を入力し、パスワードは4桁にしてください";
      return;
    }

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (snapshot.exists()) {
      msg.style.color = 'red';
      msg.textContent = "その名前はすでに使われています";
      showLoading(false);
      return;
    }

    const allSnap = await get(ref(db, 'accounts'));
    const count = allSnap.exists() ? Object.keys(allSnap.val()).length : 0;
    if (count >= 50) {
      msg.style.color = 'red';
      msg.textContent = "アカウント上限に達しました";
      showLoading(false);
      return;
    }

    await set(ref(db, 'accounts/' + name), {
      pass,
      balance: 0,
      history: [],
      lastBonus: 0
    });

    msg.style.color = 'green';
    msg.textContent = "アカウント作成成功！";
    document.getElementById('nameInput').value = '';
    document.getElementById('passInput').value = '';
    showLoading(false);
  };

  const ADMIN_NAME = '管理者';
  const ADMIN_PASS = '7421';

  // ログイン
  window.login = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const msg = document.getElementById('message');

    // 管理者ログイン
    if (name === ADMIN_NAME && pass === ADMIN_PASS) {
      currentUserName = ADMIN_NAME;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      document.getElementById('nameInput').value = '';
      document.getElementById('passInput').value = '';
      msg.textContent = '';
      window.scrollTo(0, 0);
      adminRefreshList();
      return;
    }

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (!snapshot.exists() || snapshot.val().pass !== pass) {
      msg.style.color = 'red';
      msg.textContent = "名前またはパスワードが違います";
      showLoading(false);
      return;
    }

    currentUser = snapshot.val();
    currentUserName = name;

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('bankScreen').style.display = 'block';
    updateBankUI();
    loadPendingRequests();

    document.getElementById('nameInput').value = '';
    document.getElementById('passInput').value = '';
    msg.textContent = '';
    showLoading(false);
  };

  // 残高・履歴表示
  function updateBankUI() {
    document.getElementById('balance').textContent = currentUser.balance;
    const historyDiv = document.getElementById('history');
    historyDiv.innerHTML = '';
    const hist = currentUser.history || [];
    hist.slice().reverse().forEach(h => {
      const div = document.createElement('div');
      div.textContent = h;
      div.className = 'history-item';
      historyDiv.appendChild(div);
    });
  }

  // ログインボーナス
  window.getBonus = async function() {
    const now = Date.now();
    const msg = document.getElementById('bankMessage');
    if (now - (currentUser.lastBonus || 0) < 24 * 60 * 60 * 1000) {
      msg.textContent = "まだボーナスを受け取れません（24時間後に再挑戦）";
      return;
    }

    currentUser.balance += 2;
    currentUser.history = currentUser.history || [];
    currentUser.history.push("ログインボーナス +2 しむ");
    currentUser.lastBonus = now;

    await set(ref(db, 'accounts/' + currentUserName), currentUser);
    updateBankUI();
    msg.textContent = '';
  };

  // 送金申請
  window.sendMoney = async function() {
    const toName = document.getElementById('sendTo').value.trim();
    const amount = Number(document.getElementById('sendAmount').value);
    const msg = document.getElementById('bankMessage');

    if (!toName || amount <= 0 || currentUser.balance < amount) {
      msg.style.color = 'red';
      msg.textContent = "送金できません（残高不足または入力エラー）";
      return;
    }
    if (toName === currentUserName) {
      msg.style.color = 'red';
      msg.textContent = "自分自身には送金できません";
      return;
    }
    if (amount > 10) {
      msg.style.color = 'red';
      msg.textContent = "1回の送金は10しむまでです";
      return;
    }

    showLoading(true);
    try {
      const receiverSnap = await get(ref(db, 'accounts/' + toName));
      if (!receiverSnap.exists()) {
        msg.style.color = 'red';
        msg.textContent = "送金先が見つかりません";
        showLoading(false);
        return;
      }

      // 申請データをFirebaseに保存
      const requestId = Date.now().toString();
      await set(ref(db, `requests/${toName}/${requestId}`), {
        from: currentUserName,
        amount: amount,
        timestamp: requestId
      });

      msg.style.color = 'green';
      msg.textContent = `${toName}に申請を送りました！承認を待ってください`;
      document.getElementById('sendTo').value = '';
      document.getElementById('sendAmount').value = '';
    } catch (error) {
      msg.style.color = 'red';
      msg.textContent = "申請に失敗しました";
    } finally {
      showLoading(false);
    }
  };

  // 受信申請を表示
  async function loadPendingRequests() {
    const snap = await get(ref(db, `requests/${currentUserName}`));
    const div = document.getElementById('pendingList');
    if (!snap.exists()) {
      div.innerHTML = '<p style="color:#aaa;font-size:0.85em;">申請はありません</p>';
      return;
    }
    const requests = snap.val();
    div.innerHTML = Object.entries(requests).map(([id, req]) => `
      <div style="padding:6px 0;border-bottom:1px solid #eee;">
        <b>${req.from}</b> から <b>${req.amount} しむ</b> の申請
        <div style="margin-top:4px;">
          <button onclick="approveRequest('${id}','${req.from}',${req.amount})" style="width:auto;padding:4px 10px;font-size:0.85em;display:inline-block;margin:2px;">✅ 承認</button>
          <button onclick="rejectRequest('${id}')" style="width:auto;padding:4px 10px;font-size:0.85em;display:inline-block;margin:2px;background:#e74c3c;">❌ 拒否</button>
        </div>
      </div>`).join('');
  }

  // 承認
  window.approveRequest = async function(requestId, fromName, amount) {
    const msg = document.getElementById('bankMessage');
    try {
      const senderSnap = await get(ref(db, 'accounts/' + fromName));
      if (!senderSnap.exists()) { msg.style.color='red'; msg.textContent='送金者が見つかりません'; return; }
      const sender = senderSnap.val();
      if (sender.balance < amount) { msg.style.color='red'; msg.textContent='送金者の残高が不足しています'; return; }

      const updates = {};
      updates[`accounts/${fromName}/balance`] = sender.balance - amount;
      updates[`accounts/${fromName}/history`] = [...(sender.history||[]), `${currentUserName} に ${amount} しむ送金（承認済み）`].slice(-10);
      updates[`accounts/${currentUserName}/balance`] = currentUser.balance + amount;
      updates[`accounts/${currentUserName}/history`] = [...(currentUser.history||[]), `${fromName} から ${amount} しむ受取（承認）`].slice(-10);
      updates[`requests/${currentUserName}/${requestId}`] = null;

      await update(ref(db), updates);
      currentUser.balance += amount;
      currentUser.history = [...(currentUser.history||[]), `${fromName} から ${amount} しむ受取（承認）`].slice(-10);
      updateBankUI();
      loadPendingRequests();
      msg.style.color = 'green';
      msg.textContent = `${fromName}からの${amount}しむを承認しました！`;
    } catch(e) {
      msg.style.color = 'red';
      msg.textContent = '承認に失敗しました';
    }
  };

  // 拒否
  window.rejectRequest = async function(requestId) {
    const msg = document.getElementById('bankMessage');
    await set(ref(db, `requests/${currentUserName}/${requestId}`), null);
    loadPendingRequests();
    msg.style.color = '#888';
    msg.textContent = '申請を拒否しました';
  };

  // 位置情報ボーナス
  window.getLocationBonus = async function() {
    const msg = document.getElementById('bankMessage');
    const btn = document.querySelector('button[onclick="getLocationBonus()"]');
    const now = Date.now();

    if (now - (currentUser.lastLocationBonus || 0) < 24 * 60 * 60 * 1000) {
      msg.style.color = 'red';
      msg.textContent = "位置情報ボーナスは24時間に1回です";
      return;
    }

    if (!navigator.geolocation) {
      msg.textContent = "このブラウザは位置情報に対応していません";
      return;
    }

    // ボタンを無効化して連打を防ぐ
    btn.disabled = true;
    msg.style.color = '#888';
    msg.textContent = "位置情報を取得中...";

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      const targetLat = 35.5627;
      const targetLon = 139.7163;
      const limit = 500;

      const R = 6371000;
      const dLat = (lat - targetLat) * Math.PI / 180;
      const dLon = (lon - targetLon) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(targetLat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

      if (distance <= limit) {
        currentUser.balance += 2;
        currentUser.history = currentUser.history || [];
        currentUser.history.push("📍 ログインボーナス +2 しむ");
        currentUser.lastLocationBonus = now;
        await set(ref(db, 'accounts/' + currentUserName), currentUser);
        updateBankUI();
        msg.style.color = 'green';
        msg.textContent = "📍 ボーナス +2 しむ獲得！";
      } else {
        msg.style.color = 'red';
        msg.textContent = `対象の場所から離れています（約${Math.round(distance)}m）`;
      }
      btn.disabled = false;
    }, () => {
      msg.style.color = 'red';
      msg.textContent = "位置情報の取得に失敗しました";
      btn.disabled = false;
    }, { timeout: 10000 });
  };

  // 管理者：残高設定
  window.adminSetBalance = async function() {
    const name = document.getElementById('adminTargetName').value.trim();
    const amount = Number(document.getElementById('adminSetAmount').value);
    const msg = document.getElementById('adminMessage');
    if (!name || isNaN(amount) || amount < 0) { msg.style.color='red'; msg.textContent='入力エラー'; return; }
    const snap = await get(ref(db, 'accounts/' + name));
    if (!snap.exists()) { msg.style.color='red'; msg.textContent='ユーザーが見つかりません'; return; }
    const user = snap.val();
    const newHistory = [...(user.history||[]), `🔧 管理者が残高を${amount}しむに設定`].slice(-10);
    const updates = {};
    updates[`accounts/${name}/balance`] = amount;
    updates[`accounts/${name}/history`] = newHistory;
    await update(ref(db), updates);
    msg.style.color='green'; msg.textContent=`${name}の残高を${amount}しむに設定しました`;
    adminRefreshList();
  };

  // 管理者：入金
  window.adminDeposit = async function() {
    const name = document.getElementById('adminDepositName').value.trim();
    const amount = Number(document.getElementById('adminDepositAmount').value);
    const msg = document.getElementById('adminMessage');
    if (!name || amount <= 0) { msg.style.color='red'; msg.textContent='入力エラー'; return; }
    const snap = await get(ref(db, 'accounts/' + name));
    if (!snap.exists()) { msg.style.color='red'; msg.textContent='ユーザーが見つかりません'; return; }
    const user = snap.val();
    const newBalance = (user.balance||0) + amount;
    const newHistory = [...(user.history||[]), `🏦 管理者から +${amount} しむ入金`].slice(-10);
    const updates = {};
    updates[`accounts/${name}/balance`] = newBalance;
    updates[`accounts/${name}/history`] = newHistory;
    await update(ref(db), updates);
    msg.style.color='green'; msg.textContent=`${name}に${amount}しむ入金しました`;
    adminRefreshList();
  };

  // 管理者：引き出し
  window.adminWithdraw = async function() {
    const name = document.getElementById('adminWithdrawName').value.trim();
    const amount = Number(document.getElementById('adminWithdrawAmount').value);
    const msg = document.getElementById('adminMessage');
    if (!name || amount <= 0) { msg.style.color='red'; msg.textContent='入力エラー'; return; }
    const snap = await get(ref(db, 'accounts/' + name));
    if (!snap.exists()) { msg.style.color='red'; msg.textContent='ユーザーが見つかりません'; return; }
    const user = snap.val();
    if ((user.balance||0) < amount) { msg.style.color='red'; msg.textContent='残高が足りません'; return; }
    const newBalance = user.balance - amount;
    const newHistory = [...(user.history||[]), `🏦 管理者へ -${amount} しむ引き出し`].slice(-10);
    const updates = {};
    updates[`accounts/${name}/balance`] = newBalance;
    updates[`accounts/${name}/history`] = newHistory;
    await update(ref(db), updates);
    msg.style.color='green'; msg.textContent=`${name}から${amount}しむ引き出しました`;
    adminRefreshList();
  };

  // 管理者：一覧更新
  window.adminRefreshList = async function() {
    const snap = await get(ref(db, 'accounts'));
    const listDiv = document.getElementById('adminUserList');
    if (!snap.exists()) { listDiv.textContent = 'ユーザーなし'; return; }
    const accounts = snap.val();
    listDiv.innerHTML = Object.entries(accounts)
      .sort((a,b) => (b[1].balance||0) - (a[1].balance||0))
      .map(([name, data]) => `<div style="padding:4px 0;border-bottom:1px solid #eee;">👤 ${name}：<b>${data.balance||0}</b> しむ</div>`)
      .join('');
  };

  // ログアウト
  window.logout = function() {
    currentUser = null;
    currentUserName = null;
    document.getElementById('bankScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  };

  // 初期化：必ずログイン画面だけ表示
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('bankScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'none';
</script>

<script>
  function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
