<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  html, body { height: 100%; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f0f2f5; }
  header { width: 100%; text-align: center; padding: 20px 0; background: #4caf50; color: white; font-size: 2em; font-weight: bold; position: fixed; top: 0; left: 0; z-index: 10; }
  .menu-btn { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 1.4em; cursor: pointer; }
  .drawer { position: fixed; top: 0; left: -260px; width: 240px; height: 100%; background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.2); z-index: 100; transition: left 0.3s ease; padding-top: 20px; }
  .drawer.open { left: 0; }
  .drawer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }
  .drawer-overlay.open { display: block; }
  .container { width: 350px; max-width: 90%; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  input, button { width: 80%; padding: 10px; margin: 8px auto; font-size: 1em; border-radius: 5px; border: 1px solid #ccc; text-align: center; display: block; }
  button { background: #4caf50; color: white; border: none; cursor: pointer; }
  #bankScreen, #adminScreen { position: static; transform: none; margin: 90px auto 40px auto; display: none; }
  #history { max-height: 150px; overflow-y: scroll; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; text-align: left; }
  .history-item { margin: 5px 0; font-size: 0.85em; }
  #loading { display: none; color: #888; font-size: 0.9em; }
  #restoreLoading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
  .spinner { width: 36px; height: 36px; border: 4px solid #ccc; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tab-btns { display: flex; width: 80%; margin: 0 auto 16px auto; border: 1px solid #4caf50; border-radius: 5px; overflow: hidden; }
  .tab-btn { flex: 1; margin: 0; border-radius: 0; background: white; color: #4caf50; }
  .tab-btn.active { background: #4caf50; color: white; }
</style>
</head>
<body>

<div id="restoreLoading"><div class="spinner"></div><span>読み込み中...</span></div>

<header><button class="menu-btn" onclick="toggleDrawer()">☰</button>しむPay</header>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee;">🏦 しむPay</div>
  <a style="display:block; padding:15px 20px; color:#333; text-decoration:none;" href="ranking.html">🏆 ランキング</a>
  <a style="display:block; padding:15px 20px; color:#333; cursor:pointer;" onclick="logout()">🚪 ログアウト</a>
</div>

<div class="container" id="loginScreen" style="display:none;">
  <h2 id="loginTitle">ログイン</h2>
  <div class="tab-btns">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">アカウント作成</button>
  </div>
  <input type="text" id="nameInput" placeholder="名前">
  <input type="password" id="passInput" placeholder="4桁パスワード">
  <div id="loginForm"><button onclick="login()">ログイン</button></div>
  <div id="registerForm" style="display:none;">
    <input type="password" id="passConfirmInput" placeholder="確認用パスワード">
    <button onclick="createAccount()">作成</button>
  </div>
  <p id="loading">処理中...</p>
  <p id="message" style="color:red;"></p>
</div>

<div class="container" id="bankScreen">
  <h2>残高: <span id="balance">0</span> しむ</h2>
  <button onclick="getLocationBonus()">📍 ボーナス +2 しむ</button>
  <hr>
  <h3>📨 送金申請</h3>
  <input type="text" id="sendTo" placeholder="相手の名前を正確に">
  <input type="number" id="sendAmount" placeholder="金額 (10まで)">
  <button onclick="sendMoney()">申請を送る</button>
  <hr>
  <h3>📬 届いた申請</h3>
  <div id="pendingList" style="text-align:left; font-size:0.9em; min-height:50px;"></div>
  <hr>
  <h3>履歴</h3>
  <div id="history"></div>
  <p id="bankMessage" style="color:red; font-size:0.8em;"></p>
</div>

<div class="container" id="adminScreen" style="display:none;">
  <h2>🔧 管理者</h2>
  <input type="text" id="adminTargetName" placeholder="ユーザー名">
  <input type="number" id="adminSetAmount" placeholder="設定額">
  <button onclick="adminSetBalance()">設定実行</button>
  <div id="adminUserList" style="text-align:left; margin-top:20px;"></div>
  <button onclick="logout()">ログアウト</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentUser = null, currentUserName = null;
  const ADMIN_NAME = '管理者', ADMIN_PASS = 'administrator2026';

  function showScreen(screen) {
    document.getElementById('restoreLoading').style.display = 'none';
    document.getElementById('loginScreen').style.display = screen === 'login' ? 'block' : 'none';
    document.getElementById('bankScreen').style.display = screen === 'bank' ? 'block' : 'none';
    document.getElementById('adminScreen').style.display = screen === 'admin' ? 'block' : 'none';
  }

  // リアルタイム監視開始
  function startWatch() {
    // 残高と履歴の監視
    onValue(ref(db, 'accounts/' + currentUserName), (snap) => {
      if(snap.exists()){
        currentUser = snap.val();
        document.getElementById('balance').textContent = currentUser.balance;
        const histDiv = document.getElementById('history');
        histDiv.innerHTML = (currentUser.history || []).slice().reverse().map(h => `<div class="history-item">${h}</div>`).join('');
      }
    });
    // 届いた申請の監視
    onValue(ref(db, 'requests/' + currentUserName), (snap) => {
      const div = document.getElementById('pendingList');
      if(!snap.exists()){ div.innerHTML = '<p style="color:#aaa">なし</p>'; return; }
      div.innerHTML = Object.entries(snap.val()).map(([id, r]) => `
        <div style="border-bottom:1px solid #eee; padding:8px 0;">
          <b>${r.from}</b>: ${r.amount} しむ
          <button onclick="approveRequest('${id}','${r.from}',${r.amount})" style="width:auto; display:inline; padding:2px 10px; margin-left:10px;">✅承認</button>
        </div>
      `).join('');
    });
  }

  window.login = async function() {
    const nEl = document.getElementById('nameInput'), pEl = document.getElementById('passInput');
    const name = nEl.value.trim(), pass = pEl.value.trim();
    if (name === ADMIN_NAME && pass === ADMIN_PASS) {
      currentUserName = ADMIN_NAME; nEl.value = ''; pEl.value = '';
      showScreen('admin'); adminRefreshList(); return;
    }
    const snap = await get(ref(db, 'accounts/' + name));
    if (!snap.exists() || snap.val().pass !== pass) { alert("失敗"); return; }
    currentUserName = name; nEl.value = ''; pEl.value = '';
    localStorage.setItem('shimupay_user', name);
    showScreen('bank'); startWatch();
  };

  window.sendMoney = async function() {
    const to = document.getElementById('sendTo').value.trim();
    const amt = Number(document.getElementById('sendAmount').value);
    if(!to || amt <= 0 || amt > 10 || currentUser.balance < amt) { alert("エラー: 名前間違いか残高不足、または10しむ超え"); return; }
    const targetSnap = await get(ref(db, 'accounts/' + to));
    if(!targetSnap.exists()){ alert("相手が見つかりません"); return; }
    
    await set(ref(db, `requests/${to}/${Date.now()}`), { from: currentUserName, amount: amt });
    alert("申請完了！");
    document.getElementById('sendTo').value = ''; document.getElementById('sendAmount').value = '';
  };

  window.approveRequest = async function(id, from, amt) {
    const fromSnap = await get(ref(db, 'accounts/' + from));
    const sender = fromSnap.val();
    if(sender.balance < amt) { alert("相手の残高不足"); return; }
    
    const up = {};
    up[`accounts/${from}/balance`] = sender.balance - amt;
    up[`accounts/${from}/history`] = [...(sender.history||[]), `${currentUserName}に${amt}送金`].slice(-10);
    up[`accounts/${currentUserName}/balance`] = currentUser.balance + amt;
    up[`accounts/${currentUserName}/history`] = [...(currentUser.history||[]), `${from}から${amt}受取`].slice(-10);
    up[`requests/${currentUserName}/${id}`] = null;
    await update(ref(db), up);
  };

  window.logout = () => { localStorage.removeItem('shimupay_user'); location.reload(); };

  // 起動時チェック
  const saved = localStorage.getItem('shimupay_user');
  if(saved) { currentUserName = saved; showScreen('bank'); startWatch(); } 
  else { showScreen('login'); }
</script>

<script>
  function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('drawerOverlay').classList.toggle('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
  function switchTab(t) {
    const isL = t === 'login';
    document.getElementById('loginForm').style.display = isL ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isL ? 'none' : 'block';
    document.getElementById('tabLogin').className = isL ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tabRegister').className = isL ? 'tab-btn' : 'tab-btn active';
  }
</script>
</body>
</html>
