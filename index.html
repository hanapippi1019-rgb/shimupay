<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しむPay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="しむPay">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f2f5;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background: #4caf50;
    color: white;
    font-size: 2em;
    font-weight: bold;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .menu-btn {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: white;
    font-size: 1.4em;
    cursor: pointer;
    width: auto;
    padding: 4px 8px;
    margin: 0;
    line-height: 1;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
  .drawer {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: white;
    box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    z-index: 100;
    transition: left 0.3s ease;
    padding-top: 20px;
  }
  .drawer.open { left: 0; }
  .drawer-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }
  .drawer-overlay.open { display: block; }
  .drawer-title {
    font-size: 1.2em;
    font-weight: bold;
    color: #4caf50;
    padding: 12px 20px 16px;
    border-bottom: 1px solid #eee;
  }
  .drawer-item {
    display: block;
    padding: 14px 20px;
    color: #333;
    text-decoration: none;
    font-size: 1em;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
  }
  .drawer-item:hover { background: #f5f5f5; }
  .container {
    width: 350px;
    max-width: 90%;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  input, button {
    width: 80%;
    padding: 10px;
    margin: 8px auto;
    font-size: 1em;
    border-radius: 5px;
    border: 1px solid #ccc;
    text-align: center;
    display: block;
  }
  button {
    background: #4caf50;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover { background: #45a049; }

  /* タブ切り替え */
  .tab-btns {
    display: flex;
    width: 80%;
    margin: 0 auto 16px auto;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #4caf50;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    background: white;
    color: #4caf50;
    border: none;
    cursor: pointer;
    font-size: 0.95em;
    margin: 0;
    width: auto;
    border-radius: 0;
  }
  .tab-btn.active {
    background: #4caf50;
    color: white;
  }
  .tab-btn:hover:not(.active) { background: #e8f5e9; }

  #bankScreen, #adminScreen {
    position: static;
    transform: none;
    margin: 90px auto 40px auto;
    display: none;
  }
  #history {
    max-height: 150px;
    overflow-y: scroll;
    margin-top: 10px;
    border-top: 1px solid #ccc;
    padding-top: 10px;
    text-align: left;
  }
  .history-item { margin: 5px 0; }
  #loading {
    display: none;
    color: #888;
    font-size: 0.9em;
    margin: 6px 0;
  }

  /* リロード復元中のオーバーレイ */
  #restoreLoading {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 12px;
    font-size: 1em;
    color: #888;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid #ccc;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="restoreLoading">
  <div class="spinner"></div>
  <span>読み込み中...</span>
</div>

<header>
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  しむPay
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">🏦 しむPay</div>
  <a class="drawer-item" href="ranking.html">🏆 ランキング</a>
  <a class="drawer-item" onclick="closeDrawer(); logout();">🚪 ログアウト</a>
</div>

<div class="container" id="loginScreen" style="display:none;">
  <h2 id="loginTitle">ログイン</h2>
  <div class="tab-btns">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">アカウント作成</button>
  </div>
  <input type="text" id="nameInput" placeholder="名前">
  <input type="password" id="passInput" placeholder="4桁パスワード">
  <div id="loginForm">
    <br>
    <button onclick="login()">ログイン</button>
  </div>
  <div id="registerForm" style="display:none;">
    <input type="password" id="passConfirmInput" placeholder="パスワード確認（もう一度）">
    <br>
    <button onclick="createAccount()">アカウント作成</button>
  </div>
  <p id="loading">処理中...</p>
  <p id="message" style="color:red;margin:4px 0;"></p>
</div>

<div class="container" id="bankScreen">
  <h2>しむPayアカウント</h2>
  <p>残高: <span id="balance">0</span> しむ</p>
  <button onclick="getLocationBonus()">📍 ログインボーナス +2 しむ</button>
  <h3>📨 送金申請</h3>
  <input type="text" id="sendTo" placeholder="送金先">
  <input type="number" id="sendAmount" placeholder="送金額">
  <br>
  <button onclick="sendMoney()">申請する</button>
  <h3>📬 受信した申請</h3>
  <div id="pendingList" style="max-height:150px;overflow-y:scroll;text-align:left;border-top:1px solid #ccc;padding-top:8px;font-size:0.9em;"></div>
  <h3>取引履歴</h3>
  <div id="history"></div>
  <br>
  <button onclick="logout()">ログアウト</button>
  <button onclick="location.href='ranking.html'" style="background:#888;">🏆 ランキングを見る</button>
  <p id="bankMessage" style="color:red;"></p>
</div>

<div class="container" id="adminScreen" style="display:none;overflow-y:auto;">
  <h2>🔧 管理者画面</h2>
  <h3>残高を設定</h3>
  <input type="text" id="adminTargetName" placeholder="対象ユーザー名">
  <input type="number" id="adminSetAmount" placeholder="設定する残高">
  <button onclick="adminSetBalance()">残高を設定</button>
  <h3>入金（管理者から付与）</h3>
  <input type="text" id="adminDepositName" placeholder="入金先ユーザー名">
  <input type="number" id="adminDepositAmount" placeholder="入金額">
  <button onclick="adminDeposit()">入金</button>
  <h3>引き出し（管理者に回収）</h3>
  <input type="text" id="adminWithdrawName" placeholder="引き出しユーザー名">
  <input type="number" id="adminWithdrawAmount" placeholder="引き出し額">
  <button onclick="adminWithdraw()">引き出し</button>
  <h3>全員一覧</h3>
  <div id="adminUserList" style="max-height:200px;overflow-y:scroll;text-align:left;border-top:1px solid #ccc;padding-top:10px;font-size:0.9em;"></div>
  <br>
  <button onclick="adminRefreshList()" style="background:#888;">一覧を更新</button>
  <button onclick="logout()">ログアウト</button>
  <p id="adminMessage" style="color:red;"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeZ6-QBxkvWLeHG-N20pjxvIHe05OK6Oc",
    authDomain: "simu-bank.firebaseapp.com",
    databaseURL: "https://simu-bank-default-rtdb.firebaseio.com",
    projectId: "simu-bank",
    storageBucket: "simu-bank.firebasestorage.app",
    messagingSenderId: "88269096434",
    appId: "1:88269096434:web:c030c1e599c9dc92af576b",
    measurementId: "G-Q5W7V24NC7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null;
  let currentUserName = null;

  const ADMIN_NAME = '管理者';
  const ADMIN_PASS = 'administrator2026';

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
  }

  function saveSession(name) {
    localStorage.setItem('shimupay_user', name);
  }

  function clearSession() {
    localStorage.removeItem('shimupay_user');
  }

  async function restoreSession() {
    const savedName = localStorage.getItem('shimupay_user');
    if (!savedName) {
      showScreen('login');
      return;
    }
    if (savedName === ADMIN_NAME) {
      currentUserName = ADMIN_NAME;
      showScreen('admin');
      adminRefreshList();
      return;
    }
    try {
      const snapshot = await get(ref(db, 'accounts/' + savedName));
      if (snapshot.exists()) {
        currentUser = snapshot.val();
        currentUserName = savedName;
        showScreen('bank');
        updateBankUI();
        loadPendingRequests();
      } else {
        clearSession();
        showScreen('login');
      }
    } catch (e) {
      clearSession();
      showScreen('login');
    }
  }

  function showScreen(screen) {
    document.getElementById('restoreLoading').style.display = 'none';
    document.getElementById('loginScreen').style.display = screen === 'login' ? 'block' : 'none';
    document.getElementById('bankScreen').style.display = screen === 'bank' ? 'block' : 'none';
    document.getElementById('adminScreen').style.display = screen === 'admin' ? 'block' : 'none';
  }

  window.switchTab = function(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('loginTitle').textContent = isLogin ? 'ログイン' : 'アカウント作成';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('passConfirmInput').value = '';
    document.getElementById('message').textContent = '';
  };

  window.createAccount = async function() {
    const nameEl = document.getElementById('nameInput');
    const passEl = document.getElementById('passInput');
    const passConfEl = document.getElementById('passConfirmInput');
    const name = nameEl.value.trim();
    const pass = passEl.value.trim();
    const passConfirm = passConfEl.value.trim();
    const msg = document.getElementById('message');

    const ngWords = ['まんこ','ちんこ','おまんこ','おちんこ','おちんぽ','シコシコ','しこしこ','おっぱい','おつぱい','セックス','せっくす','セツクス','おしっこ','おしつこ','アナル','あなる','死ね','しね','殺す','ころす','クズ','くず','バカ','ばか','アホ','あほ','キモい','きもい','うんこ','ウンコ','うんち','ウンチ','ちんぽ','チンポ','ちんぽこ','チンポコ'];
    if (ngWords.some(w => name.includes(w))) {
      msg.style.color = 'red'; msg.textContent = "その名前は使用できません"; return;
    }
    if (!name) {
      msg.style.color = 'red'; msg.textContent = "名前を入力してください"; return;
    }
    if (!pass || pass.length !== 4 || !/^\d{4}$/.test(pass)) {
      msg.style.color = 'red'; msg.textContent = "パスワードは数字4桁にしてください"; return;
    }
    if (pass !== passConfirm) {
      msg.style.color = 'red'; msg.textContent = "パスワードが一致しません"; return;
    }

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (snapshot.exists()) {
      msg.style.color = 'red'; msg.textContent = "その名前はすでに使われています"; showLoading(false); return;
    }

    await set(ref(db, 'accounts/' + name), {
      pass, balance: 0, history: [], lastBonus: 0, createdAt: Date.now()
    });

    msg.style.color = 'green';
    msg.textContent = "アカウント作成成功！ログインしてください";
    nameEl.value = '';
    passEl.value = '';
    passConfEl.value = '';
    showLoading(false);
    switchTab('login');
  };

  window.login = async function() {
    const nameEl = document.getElementById('nameInput');
    const passEl = document.getElementById('passInput');
    const name = nameEl.value.trim();
    const pass = passEl.value.trim();
    const msg = document.getElementById('message');

    if (name === ADMIN_NAME && pass === ADMIN_PASS) {
      currentUserName = ADMIN_NAME;
      saveSession(ADMIN_NAME);
      // 入力を消去
      nameEl.value = '';
      passEl.value = '';
      msg.textContent = '';
      showScreen('admin');
      adminRefreshList();
      return;
    }

    showLoading(true);
    const snapshot = await get(ref(db, 'accounts/' + name));
    if (!snapshot.exists() || snapshot.val().pass !== pass) {
      msg.style.color = 'red'; msg.textContent = "名前またはパスワードが違います"; showLoading(false); return;
    }

    currentUser = snapshot.val();
    currentUserName = name;
    saveSession(name);

    // ログイン成功時に内容を消去
    nameEl.value = '';
    passEl.value = '';
    msg.textContent = '';

    showScreen('bank');
    updateBankUI();
    loadPendingRequests();
    showLoading(false);
  };

  function updateBankUI() {
    document.getElementById('balance').textContent = currentUser.balance;
    const historyDiv = document.getElementById('history');
    historyDiv.innerHTML = '';
    const hist = currentUser.history || [];
    hist.slice().reverse().forEach(h => {
      const div = document.createElement('div');
      div.textContent = h;
      div.className = 'history-item';
      historyDiv.appendChild(div);
    });
  }

  window.sendMoney = async function() {
    const toName = document.getElementById('sendTo').value.trim();
    const amount = Number(document.getElementById('sendAmount').value);
    const msg = document.getElementById('bankMessage');
    if (!toName || amount <= 0 || currentUser.balance < amount) {
      msg.style.color = 'red'; msg.textContent = "入力内容または残高を確認してください"; return;
    }
    showLoading(true);
    try {
      const receiverSnap = await get(ref(db, 'accounts/' + toName));
      if (!receiverSnap.exists()) {
        msg.style.color = 'red'; msg.textContent = "送金先が見つかりません"; showLoading(false); return;
      }
      const requestId = Date.now().toString();
      await set(ref(db, `requests/${toName}/${requestId}`), {
        from: currentUserName, amount: amount, timestamp: requestId
      });
      msg.style.color = 'green'; msg.textContent = "申請を送りました";
      document.getElementById('sendTo').value = '';
      document.getElementById('sendAmount').value = '';
    } catch (error) {
      msg.style.color = 'red'; msg.textContent = "申請に失敗しました";
    } finally {
      showLoading(false);
    }
  };

  async function loadPendingRequests() {
    const snap = await get(ref(db, `requests/${currentUserName}`));
    const div = document.getElementById('pendingList');
    if (!snap.exists()) { div.innerHTML = '<p>申請はありません</p>'; return; }
    div.innerHTML = Object.entries(snap.val()).map(([id, req]) => `
      <div style="padding:6px 0;border-bottom:1px solid #eee;">
        <b>${req.from}</b> から ${req.amount} しむ
        <button onclick="approveRequest('${id}','${req.from}',${req.amount})" style="width:auto;display:inline;padding:2px 8px;">✅ 承認</button>
      </div>`).join('');
  }

  window.approveRequest = async function(requestId, fromName, amount) {
    try {
      const senderSnap = await get(ref(db, 'accounts/' + fromName));
      const sender = senderSnap.val();
      const updates = {};
      updates[`accounts/${fromName}/balance`] = sender.balance - amount;
      updates[`accounts/${currentUserName}/balance`] = currentUser.balance + amount;
      updates[`requests/${currentUserName}/${requestId}`] = null;
      await update(ref(db), updates);
      currentUser.balance += amount;
      updateBankUI();
      loadPendingRequests();
    } catch(e) { alert('承認に失敗しました'); }
  };

  window.logout = function() {
    currentUser = null;
    currentUserName = null;
    clearSession();
    showScreen('login');
  };

  restoreSession();
</script>

<script>
  function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }
</script>
</body>
</html>
